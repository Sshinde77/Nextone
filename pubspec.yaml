name: nextone
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  http: ^1.5.0
  http_parser: ^4.1.1
  fl_chart: ^0.71.0
  intl: ^0.20.2
  url_launcher: ^6.3.2
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  flutter_image_compress: ^2.3.0
  path_provider: ^2.1.4
  socket_io_client: ^3.1.2
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/logo.png

flutter_launcher_icons:
android: true
ios: true
image_path: "assets/logo/logo.png"
adaptive_icon_background: "#ffffff"
adaptive_icon_foreground: "assets/logo/logo.png"
